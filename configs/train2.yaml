  epochs: 50
  batch_size: 6
  lr: 0.0001           # single LR — ViT is frozen, only graph/fusion/BiLSTM params train
  optimizer: "AdamW"
  weight_decay: 0.0001
  num_frames: 8
  focal_gamma: 2.0
  mincut_weight: 0.1
  ortho_weight: 0.01

paths:
  checkpoint_dir: "/home/cse/Desktop/zahin_thesis_work/My_Thesis_Repo/checkpoints"
  log_dir: "/home/cse/Desktop/zahin_thesis_work/My_Thesis_Repo/logs"

early_stopping:
  patience: 5
  delta: 0.0005

seed: 42
device: "cuda"
resume: false