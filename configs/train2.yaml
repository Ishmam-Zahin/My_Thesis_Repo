  epochs: 50
  batch_size: 8
  lr: 0.00005
  optimizer: "AdamW"
  weight_decay: 0.00001
  num_frames: 8

  # Loss weights
  focal_gamma: 2.0
  mincut_weight: 0.5
  ortho_weight: 0.05

paths:
  checkpoint_dir: "/home/cse/Desktop/zahin_thesis_work/My_Thesis_Repo/checkpoints"
  log_dir: "/home/cse/Desktop/zahin_thesis_work/My_Thesis_Repo/logs"

early_stopping:
  patience: 5
  delta: 0.0005

seed: 42
device: "cuda"
resume: false