data:
  json_root: "/home/cse/Desktop/zahin_thesis_work/My_Thesis_Repo/rearrange/dataset_json"
  dataset_name: "FaceForensics++"
  real_weight: 5.0
  fake_weight: 1.0

model:
  model_path: "/home/cse/Desktop/zahin_thesis_work/My_Thesis_Repo/models/model9.py"   # ← update to your current file
  model_class: "MyModel"
  vit_name: "dinov2_vits14"
  vit_weight: "/home/cse/Desktop/zahin_thesis_work/My_Thesis_Repo/vit_weights/best_vit_checkpoint.pth"  # optional but recommended

  # === NEW: All model hyperparameters now configurable from here ===
  num_gcn_layers: 2
